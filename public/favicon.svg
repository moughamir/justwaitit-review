<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#3F57AF"/>
      <stop offset="45%"  stop-color="#6049A8"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <!-- Subtle inner-top glint for depth -->
    <radialGradient id="glint" cx="38%" cy="22%" r="55%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background: brand gradient, rounded square -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Glint overlay -->
  <rect width="512" height="512" rx="100" fill="url(#glint)"/>

  <!-- Serif "A" — elegant high-contrast letterform -->
  <text
    x="256"
    y="396"
    font-size="388"
    font-weight="700"
    font-family="Georgia, 'Palatino Linotype', Palatino, serif"
    text-anchor="middle"
    fill="white"
    opacity="0.96"
  >A</text>
</svg>
